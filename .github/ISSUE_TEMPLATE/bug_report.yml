name: Bug report
description: Report a reproducible problem. Do not include secrets or energized-wiring experiments.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Disconnect power before investigating hardware behavior.
  - type: input
    id: version
    attributes:
      label: Firmware version or commit
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options: [Arduino Mega anode controller, ESP32 Matter gateway, UART protocol, Documentation, Tests]
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and safe reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant serial logs
      render: text
