name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-mega:
    name: Build Arduino Mega anode controller
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install "platformio==6.1.19" "click==8.1.7"
      - run: pio run --environment mega-anode-controller
      - uses: actions/upload-artifact@v4
        with:
          name: mega-anode-controller
          path: .pio/build/mega-anode-controller/firmware.hex

  build-esp32-matter:
    name: Build ESP32 Matter gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install "platformio==6.1.19" "click==8.1.7"
      - run: pio run --environment esp32-Matter-gateway
      - uses: actions/upload-artifact@v4
        with:
          name: esp32-Matter-gateway
          path: .pio/build/esp32-Matter-gateway/firmware.bin

  native-tests:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install "platformio==6.1.19" "click==8.1.7"
      - run: pio test --environment native

  formatting:
    name: Formatting and whitespace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: git diff --check $(git hash-object -t tree /dev/null) HEAD
