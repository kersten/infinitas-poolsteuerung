name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-tests:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Run shared-logic tests
        run: pio test --environment native

  build-mega:
    name: Build Arduino Mega firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install PlatformIO
        run: pip install platformio
      - run: pio run --environment mega-controller

  build-esp32-matter:
    name: Build ESP32 Matter gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up ESP-IDF
        uses: espressif/setup-esp-idf@v1
        with:
          version: v5.4.1
      - name: Check out ESP-Matter v1.4.2
        run: |
          git clone --branch release/v1.4.2 --depth 1 https://github.com/espressif/esp-matter.git "$RUNNER_TEMP/esp-matter"
          git -C "$RUNNER_TEMP/esp-matter" submodule update --init --depth 1
          cd "$RUNNER_TEMP/esp-matter/connectedhomeip/connectedhomeip"
          ./scripts/checkout_submodules.py --platform esp32 linux --shallow
          cd ../..
          ./install.sh
      - name: Build Matter gateway
        working-directory: esp32-gateway
        run: |
          export ESP_MATTER_PATH="$RUNNER_TEMP/esp-matter"
          . "$ESP_MATTER_PATH/export.sh"
          idf.py set-target esp32
          idf.py build

  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check whitespace errors
        run: git diff --check $(git hash-object -t tree /dev/null) HEAD
