name: Release firmware

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install "platformio==6.1.19" "click==8.1.7"
      - run: pio run --environment mega-anode-controller
      - run: pio run --environment esp32-Matter-gateway
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            .pio/build/mega-anode-controller/firmware.hex
            .pio/build/esp32-Matter-gateway/firmware.bin
