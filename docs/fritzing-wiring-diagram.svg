<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Infinitas pool timer controller low-voltage wiring diagram</title>
  <desc id="desc">A Fritzing-style breadboard diagram showing an Arduino Mega, ESP32 DevKit, L298N, WS2812 ring, two push buttons, UART level divider, capacitor, and common ground wiring.</desc>
  <defs>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #20252a; }
      .small { font-size: 14px; }
      .pin { font-size: 13px; font-weight: 700; }
      .note { font-size: 15px; fill: #3e474f; }
      .wire { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 7; }
      .signal { stroke: #f0b323; }
      .uart { stroke: #3484c5; }
      .ground { stroke: #30363b; }
      .power { stroke: #dc3f32; }
      .component-label { font-size: 20px; font-weight: 700; }
      .pin-label { font-size: 14px; font-weight: 700; fill: #fff; }
      .callout { fill: #fff7d6; stroke: #d4af37; stroke-width: 2; }
      .board-text { font-family: Arial, Helvetica, sans-serif; fill: #e7f4df; }
      .esp-text { font-family: Arial, Helvetica, sans-serif; fill: #dbeafa; }
    </style>
    <pattern id="board" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#1f5d3c"/>
      <path d="M0 6h12M6 0v12" stroke="#2f7952" stroke-width="1" opacity=".45"/>
    </pattern>
    <linearGradient id="mega" x1="0" x2="1">
      <stop stop-color="#1c8a5b"/>
      <stop offset="1" stop-color="#146a47"/>
    </linearGradient>
    <linearGradient id="esp" x1="0" x2="1">
      <stop stop-color="#385e9d"/>
      <stop offset="1" stop-color="#294778"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="#f5f1e7"/>
  <text x="70" y="65" class="label" font-size="30" font-weight="700">Infinitas pool timer controller — low-voltage wiring</text>
  <text x="70" y="92" class="label note">Fritzing-style connection diagram. Disconnect all power before wiring; mains/load-side wiring is intentionally excluded.</text>

  <!-- Colour key -->
  <g transform="translate(70 125)">
    <path d="M0 0h48" class="wire signal"/><text x="62" y="5" class="label small">I/O signal</text>
    <path d="M185 0h48" class="wire uart"/><text x="247" y="5" class="label small">UART</text>
    <path d="M360 0h48" class="wire power"/><text x="422" y="5" class="label small">regulated 5 V</text>
    <path d="M585 0h48" class="wire ground"/><text x="647" y="5" class="label small">common GND</text>
  </g>

  <!-- ESP32 DevKit -->
  <g aria-label="ESP32 DevKit">
    <rect x="170" y="205" width="250" height="340" rx="16" fill="url(#esp)" stroke="#19355c" stroke-width="4"/>
    <rect x="242" y="224" width="105" height="74" rx="8" fill="#d8e4ef" stroke="#7c97ad" stroke-width="3"/>
    <text x="294" y="257" class="label component-label" text-anchor="middle" fill="#213547">ESP32</text>
    <text x="294" y="280" class="label small" text-anchor="middle">DevKit</text>
    <rect x="282" y="315" width="25" height="47" rx="3" fill="#1f252b"/>
    <text x="295" y="405" class="label pin-label" text-anchor="middle">GPIO16 / RX2</text>
    <text x="295" y="443" class="label pin-label" text-anchor="middle">GPIO17 / TX2</text>
    <text x="295" y="481" class="label pin-label" text-anchor="middle">GND</text>
    <g fill="#d4a635" stroke="#876a15" stroke-width="2">
      <circle cx="420" cy="400" r="7"/><circle cx="420" cy="438" r="7"/><circle cx="420" cy="476" r="7"/>
    </g>
    <text x="185" y="525" class="esp-text small">ESP-Matter gateway · 3.3 V logic</text>
  </g>

  <!-- Two buttons -->
  <g aria-label="Two normally open buttons">
    <text x="95" y="575" class="label component-label">External control box</text>
    <g transform="translate(105 630)">
      <text x="0" y="-15" class="label pin">LEFT button · D24</text>
      <rect x="0" y="0" width="128" height="62" rx="9" fill="#d9d9d9" stroke="#777" stroke-width="3"/>
      <circle cx="64" cy="31" r="21" fill="#b5332e" stroke="#72231f" stroke-width="3"/>
      <circle cx="0" cy="31" r="6" fill="#d4a635" stroke="#876a15" stroke-width="2"/>
      <circle cx="128" cy="31" r="6" fill="#d4a635" stroke="#876a15" stroke-width="2"/>
    </g>
    <g transform="translate(320 630)">
      <text x="0" y="-15" class="label pin">RIGHT button · D26</text>
      <rect x="0" y="0" width="128" height="62" rx="9" fill="#d9d9d9" stroke="#777" stroke-width="3"/>
      <circle cx="64" cy="31" r="21" fill="#b5332e" stroke="#72231f" stroke-width="3"/>
      <circle cx="0" cy="31" r="6" fill="#d4a635" stroke="#876a15" stroke-width="2"/>
      <circle cx="128" cy="31" r="6" fill="#d4a635" stroke="#876a15" stroke-width="2"/>
    </g>
    <text x="105" y="727" class="label note">Normally open; the Mega uses INPUT_PULLUP (active-low).</text>
  </g>

  <!-- WS2812 ring -->
  <g aria-label="16 pixel WS2812 LED ring">
    <text x="220" y="817" class="label component-label">16-pixel WS2812 ring</text>
    <circle cx="330" cy="938" r="118" fill="#343a40" stroke="#171a1d" stroke-width="6"/>
    <circle cx="330" cy="938" r="75" fill="#f5f1e7" stroke="#a6a29b" stroke-width="4"/>
    <g fill="#f4c23c" stroke="#8d6915" stroke-width="2">
      <circle cx="330" cy="838" r="13"/><circle cx="368" cy="846" r="13"/><circle cx="401" cy="867" r="13"/><circle cx="422" cy="900" r="13"/>
      <circle cx="430" cy="938" r="13"/><circle cx="422" cy="976" r="13"/><circle cx="401" cy="1009" r="13"/><circle cx="368" cy="1030" r="13"/>
      <circle cx="330" cy="1038" r="13"/><circle cx="292" cy="1030" r="13"/><circle cx="259" cy="1009" r="13"/><circle cx="238" cy="976" r="13"/>
      <circle cx="230" cy="938" r="13"/><circle cx="238" cy="900" r="13"/><circle cx="259" cy="867" r="13"/><circle cx="292" cy="846" r="13"/>
    </g>
    <text x="330" y="933" class="label" font-size="18" font-weight="700" text-anchor="middle">WS2812</text>
    <text x="330" y="955" class="label small" text-anchor="middle">DIN · 5 V · GND</text>
    <g fill="#d4a635" stroke="#876a15" stroke-width="2">
      <circle cx="465" cy="888" r="7"/><circle cx="465" cy="924" r="7"/><circle cx="465" cy="960" r="7"/>
    </g>
    <text x="478" y="893" class="label pin">DIN</text>
    <text x="478" y="929" class="label pin">5 V</text>
    <text x="478" y="965" class="label pin">GND</text>
  </g>

  <!-- Arduino Mega -->
  <g aria-label="Arduino Mega 2560 controller">
    <rect x="570" y="170" width="385" height="785" rx="18" fill="url(#mega)" stroke="#10462e" stroke-width="5"/>
    <rect x="674" y="192" width="177" height="93" rx="8" fill="#18262f" stroke="#090e12" stroke-width="3"/>
    <text x="762" y="232" class="board-text" font-size="25" font-weight="700" text-anchor="middle">ARDUINO</text>
    <text x="762" y="260" class="board-text" font-size="22" font-weight="700" text-anchor="middle">MEGA 2560</text>
    <rect x="604" y="205" width="42" height="55" rx="5" fill="#b6babd" stroke="#60666a" stroke-width="3"/>
    <rect x="604" y="331" width="48" height="95" rx="4" fill="#1d2327" stroke="#101316" stroke-width="3"/>
    <rect x="659" y="335" width="200" height="245" rx="6" fill="url(#board)" stroke="#2a8559" stroke-width="2"/>
    <text x="759" y="470" class="board-text" font-size="20" text-anchor="middle">Main controller</text>
    <text x="759" y="496" class="board-text small" text-anchor="middle">timers · buttons · LEDs · loads</text>

    <!-- left-side socket row -->
    <g fill="#d4a635" stroke="#876a15" stroke-width="2">
      <circle cx="570" cy="553" r="7"/><circle cx="570" cy="591" r="7"/><circle cx="570" cy="629" r="7"/>
      <circle cx="570" cy="700" r="7"/><circle cx="570" cy="738" r="7"/><circle cx="570" cy="887" r="7"/>
    </g>
    <g class="label pin" text-anchor="start">
      <text x="585" y="558">D22 · LED DATA</text>
      <text x="585" y="596">D24 · LEFT BUTTON</text>
      <text x="585" y="634">D26 · RIGHT BUTTON</text>
      <text x="585" y="705">D18 / TX1 · 5 V UART</text>
      <text x="585" y="743">D19 / RX1</text>
      <text x="585" y="892">GND</text>
    </g>

    <!-- right-side socket row -->
    <g fill="#d4a635" stroke="#876a15" stroke-width="2">
      <circle cx="955" cy="365" r="7"/><circle cx="955" cy="403" r="7"/><circle cx="955" cy="441" r="7"/>
      <circle cx="955" cy="479" r="7"/><circle cx="955" cy="517" r="7"/><circle cx="955" cy="555" r="7"/><circle cx="955" cy="849" r="7"/>
    </g>
    <g class="label pin" text-anchor="end">
      <text x="940" y="370">D3 · IN1 (A ON)</text>
      <text x="940" y="408">D2 · IN2 (A OFF)</text>
      <text x="940" y="446">D4 · NOT CONNECTED</text>
      <text x="940" y="484">D5 · NOT CONNECTED</text>
      <text x="940" y="522">D7 · IN3 (B ON)</text>
      <text x="940" y="560">D6 · IN4 (B OFF)</text>
      <text x="940" y="854">GND</text>
    </g>
    <text x="762" y="800" class="board-text small" text-anchor="middle">D4 / D5 stay unconnected; L298N enable jumpers remain fitted.</text>
  </g>

  <!-- UART level divider, placed between Mega and ESP32 -->
  <g aria-label="UART resistor divider">
    <text x="500" y="324" class="label" font-size="17" font-weight="700" text-anchor="middle">TX1 level divider</text>
    <text x="500" y="346" class="label small" text-anchor="middle">1 kΩ / 2 kΩ → 3.3 V RX2</text>
    <path d="M570 700H528" class="wire uart"/>
    <path d="M528 700H515" class="wire uart"/>
    <rect x="463" y="686" width="52" height="28" rx="3" fill="#e1c17d" stroke="#876a15" stroke-width="3"/>
    <text x="489" y="705" class="label pin" text-anchor="middle">1 kΩ</text>
    <path d="M463 700H440V400H420" class="wire uart"/>
    <circle cx="440" cy="700" r="7" fill="#d4a635" stroke="#876a15" stroke-width="2"/>
    <path d="M440 700V735" class="wire ground"/>
    <rect x="426" y="735" width="28" height="52" rx="3" fill="#e1c17d" stroke="#876a15" stroke-width="3"/>
    <text x="440" y="765" class="label pin" text-anchor="middle" transform="rotate(-90 440 765)">2 kΩ</text>
    <path d="M440 787V887H570" class="wire ground"/>
    <path d="M420 438H540V738H570" class="wire uart"/>
    <text x="455" y="425" class="label small">RX2</text>
    <text x="480" y="725" class="label small">TX1</text>
    <text x="490" y="730" class="label small">TX2 → RX1 (direct)</text>
  </g>

  <!-- L298N -->
  <g aria-label="Existing L298N driver">
    <text x="1255" y="184" class="label component-label" text-anchor="middle">Existing Infinitas L298N</text>
    <rect x="1120" y="205" width="330" height="500" rx="18" fill="#c83c34" stroke="#812721" stroke-width="5"/>
    <rect x="1208" y="232" width="154" height="105" rx="8" fill="#232a2e" stroke="#151a1c" stroke-width="4"/>
    <text x="1285" y="281" class="board-text" font-size="25" font-weight="700" text-anchor="middle">L298N</text>
    <text x="1285" y="307" class="board-text small" text-anchor="middle">two-channel driver</text>
    <g fill="#d4a635" stroke="#876a15" stroke-width="2">
      <circle cx="1120" cy="365" r="7"/><circle cx="1120" cy="403" r="7"/><circle cx="1120" cy="441" r="7"/>
      <circle cx="1120" cy="479" r="7"/><circle cx="1120" cy="517" r="7"/><circle cx="1120" cy="555" r="7"/><circle cx="1120" cy="640" r="7"/>
    </g>
    <g class="label pin" text-anchor="start">
      <text x="1136" y="370">IN1 · channel A ON</text>
      <text x="1136" y="408">IN2 · channel A OFF</text>
      <text x="1136" y="446">ENA · jumper fitted</text>
      <text x="1136" y="484">ENB · jumper fitted</text>
      <text x="1136" y="522">IN3 · channel B ON</text>
      <text x="1136" y="560">IN4 · channel B OFF</text>
      <text x="1136" y="645">GND</text>
    </g>
    <g transform="translate(1367 422)">
      <rect x="0" y="0" width="44" height="25" rx="3" fill="#ecd783" stroke="#8a7019" stroke-width="3"/>
      <rect x="0" y="38" width="44" height="25" rx="3" fill="#ecd783" stroke="#8a7019" stroke-width="3"/>
      <text x="22" y="18" class="label pin" text-anchor="middle">ENA</text>
      <text x="22" y="56" class="label pin" text-anchor="middle">ENB</text>
    </g>
    <rect x="1152" y="585" width="266" height="83" rx="8" fill="#f6e6a7" stroke="#9a7820" stroke-width="3"/>
    <text x="1285" y="616" class="label" font-size="16" font-weight="700" text-anchor="middle">Load / mains-side terminals</text>
    <text x="1285" y="642" class="label small" text-anchor="middle">Not shown — qualified installation only</text>
  </g>

  <!-- L298N signal wires -->
  <path d="M955 365H1120" class="wire signal"/>
  <path d="M955 403H1078V403H1120" class="wire signal"/>
  <path d="M955 517H1040V517H1120" class="wire signal"/>
  <path d="M955 555H1005V555H1120" class="wire signal"/>
  <path d="M955 849H1065V640H1120" class="wire ground"/>

  <!-- Button wires -->
  <path d="M105 661H72V590H570" class="wire signal"/>
  <path d="M448 661H490V629H570" class="wire signal"/>
  <path d="M233 661V785H570V887" class="wire ground"/>
  <path d="M320 661V785H570" class="wire ground"/>

  <!-- LED data wire and series resistor -->
  <path d="M570 553H530V888H520" class="wire signal"/>
  <rect x="488" y="874" width="32" height="28" rx="3" fill="#e1c17d" stroke="#876a15" stroke-width="3"/>
  <text x="504" y="868" class="label small" text-anchor="middle">330–470 Ω</text>
  <path d="M488 888H465" class="wire signal"/>

  <!-- Regulated 5 V supply and capacitor -->
  <g aria-label="Regulated 5 volt supply and capacitor">
    <rect x="925" y="935" width="285" height="98" rx="12" fill="#efe9dc" stroke="#77736a" stroke-width="4"/>
    <text x="1067" y="970" class="label component-label" text-anchor="middle">regulated 5 V supply</text>
    <text x="1067" y="998" class="label note" text-anchor="middle">size for 16 pixels; isolated low voltage</text>
    <circle cx="925" cy="960" r="7" fill="#d4a635" stroke="#876a15" stroke-width="2"/>
    <circle cx="925" cy="1010" r="7" fill="#d4a635" stroke="#876a15" stroke-width="2"/>
    <text x="940" y="965" class="label pin">+5 V</text>
    <text x="940" y="1015" class="label pin">GND</text>
    <g transform="translate(640 930)">
      <text x="40" y="-16" class="label pin" text-anchor="middle">≈1000 µF electrolytic</text>
      <path d="M40 0V25M18 25H62M25 42H55M40 42V80" stroke="#4d5961" stroke-width="5" stroke-linecap="round"/>
      <text x="10" y="18" class="label" font-size="20" font-weight="700">+</text>
      <text x="10" y="70" class="label" font-size="20" font-weight="700">−</text>
    </g>
    <path d="M925 960H770V955H680" class="wire power"/>
    <path d="M925 1010H770V1010H680" class="wire ground"/>
  </g>

  <!-- Ring power and ground -->
  <path d="M925 960H820V924H465" class="wire power"/>
  <path d="M925 1010H820V960H465" class="wire ground"/>
  <path d="M570 887H520V960H465" class="wire ground"/>
  <path d="M420 476H500V887H570" class="wire ground"/>

  <!-- Important callouts -->
  <g>
    <rect x="80" y="190" width="440" height="100" rx="10" class="callout"/>
    <text x="102" y="224" class="label" font-size="17" font-weight="700">USB warning</text>
    <text x="102" y="251" class="label note">Do not connect the Mega USB port to ESP32 USB.</text>
    <text x="102" y="275" class="label note">Use their separate USB connections only for power/programming.</text>
  </g>
  <g>
    <rect x="1135" y="760" width="360" height="118" rx="10" class="callout"/>
    <text x="1157" y="794" class="label" font-size="17" font-weight="700">Control-cable guidance</text>
    <text x="1157" y="821" class="label note">Run a ground conductor alongside LED data,</text>
    <text x="1157" y="845" class="label note">keep the 1 m control cable away from mains,</text>
    <text x="1157" y="869" class="label note">and provide strain relief at the enclosure.</text>
  </g>

  <text x="70" y="1072" class="label small">Source of truth: docs/wiring.md. The Mega alone controls L298N outputs; the ESP32 is a Matter gateway over UART.</text>
</svg>
