[platformio]
default_envs = mega-anode-controller, esp32-Matter-gateway
src_dir = src
lib_dir = lib
test_dir = test

[env]
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra

[env:mega-anode-controller]
platform = atmelavr
board = megaatmega2560
framework = arduino
build_src_filter =
    +<mega-anode-controller/>
    -<esp32-Matter-gateway/>
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3

[env:esp32-Matter-gateway]
; Arduino Matter requires Arduino-ESP32 3.x. Pin the PlatformIO-compatible
; Espressif32 platform so framework and prebuilt library revisions stay aligned.
platform = https://github.com/pioarduino/platform-espressif32.git#54.03.21
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv
build_src_filter =
    +<esp32-Matter-gateway/>
    -<mega-anode-controller/>

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_src_filter = -<*>
build_flags =
    -std=gnu++11
    -Wall
    -Wextra
